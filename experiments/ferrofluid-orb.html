<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferrofluid Orb</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050810; overflow: hidden; }
    canvas { display: block; }
    #status {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.25); font-family: 'Courier New', monospace;
      font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="status">idle — T: think · S: speak · I: idle</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050810);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.8;
controls.maxDistance = 8;

// ── Post-processing ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.4,   // strength
  0.4,   // radius
  0.1    // threshold
);
composer.addPass(bloomPass);

// ── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloomPass.setSize(innerWidth, innerHeight);
});

// ── Clock & animate ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();

// ── Particles (sparkly void) ─────────────────────────────────────────────────
(function buildParticles() {
  const COUNT = 2200;
  const positions = new Float32Array(COUNT * 3);
  const sizes     = new Float32Array(COUNT);
  const alphas    = new Float32Array(COUNT);

  for (let i = 0; i < COUNT; i++) {
    // distribute in a shell between r=2.5 and r=7
    const r     = 2.5 + Math.random() * 4.5;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
    sizes[i]  = 0.5 + Math.random() * 1.5;
    alphas[i] = 0.2 + Math.random() * 0.7;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aAlpha',   new THREE.BufferAttribute(alphas, 1));

  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    vertexShader: `
      attribute float aSize;
      attribute float aAlpha;
      varying float vAlpha;
      void main() {
        vAlpha = aAlpha;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = clamp(aSize * (300.0 / -mv.z), 1.0, 64.0);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float a = smoothstep(0.5, 0.1, d) * vAlpha;
        gl_FragColor = vec4(0.7, 0.85, 1.0, a);
      }
    `,
  });

  scene.add(new THREE.Points(geo, mat));
})();

// ── Ferrofluid Orb ───────────────────────────────────────────────────────────
const GLSL_SIMPLEX = /* glsl */`
  vec3 mod289v3(vec3 x) { return x - floor(x*(1./289.))*289.; }
  vec4 mod289v4(vec4 x) { return x - floor(x*(1./289.))*289.; }
  vec4 permute(vec4 x) { return mod289v4(((x*34.)+1.)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314*r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1./6., 1./3.);
    const vec4 D = vec4(0., 0.5, 1., 2.);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g  = step(x0.yzx, x0.xyz);
    vec3 l  = 1. - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289v3(i);
    vec4 p = permute(permute(permute(
      i.z + vec4(0., i1.z, i2.z, 1.))
      + i.y + vec4(0., i1.y, i2.y, 1.))
      + i.x + vec4(0., i1.x, i2.x, 1.));
    float n_ = .142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.*floor(p*ns.z*ns.z);
    vec4 x_ = floor(j*ns.z);
    vec4 y_ = floor(j - 7.*x_);
    vec4 x = x_*ns.x + ns.yyyy;
    vec4 y = y_*ns.x + ns.yyyy;
    vec4 h = 1. - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.+1.;
    vec4 s1 = floor(b1)*2.+1.;
    vec4 sh = -step(h, vec4(0.));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy,h.x);
    vec3 p1 = vec3(a0.zw,h.y);
    vec3 p2 = vec3(a1.xy,h.z);
    vec3 p3 = vec3(a1.zw,h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
    vec4 m = max(.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.);
    m = m*m;
    return 42.*dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }
`;

const orbUniforms = {
  uTime:   { value: 0 },
  uEnergy: { value: 0.15 },
  uColor:  { value: new THREE.Color(0x0055ff) },
};

const orbMat = new THREE.ShaderMaterial({
  uniforms: orbUniforms,
  vertexShader: /* glsl */`
    ${GLSL_SIMPLEX}
    uniform float uTime;
    uniform float uEnergy;
    varying vec3 vNormal;
    varying vec3 vWorldPos;

    float noiseDisp(vec3 q) {
      return (snoise(q * 1.8 + uTime * 0.40) * 0.30
            + snoise(q * 3.5 + uTime * 0.70) * 0.14
            + snoise(q * 7.0 + uTime * 1.10) * 0.06) * uEnergy;
    }

    void main() {
      vec3 p = position;

      float disp = noiseDisp(p);
      vec3 displaced = p + normal * disp;

      // Approximate displaced normal via finite differences
      vec3 tangent   = normalize(cross(normal, vec3(0.0, 1.0, 0.0001)));
      vec3 bitangent = cross(normal, tangent);
      float eps = 0.02;
      float dx = (noiseDisp(p + tangent * eps) - noiseDisp(p - tangent * eps)) / (2.0 * eps);
      float dy = (noiseDisp(p + bitangent * eps) - noiseDisp(p - bitangent * eps)) / (2.0 * eps);
      vec3 displacedNormal = normalize(normal - dx * tangent - dy * bitangent);

      vNormal   = normalize(normalMatrix * displacedNormal);
      vWorldPos = (modelMatrix * vec4(displaced, 1.0)).xyz;

      gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    uniform vec3  uColor;
    uniform float uEnergy;
    varying vec3  vNormal;
    varying vec3  vWorldPos;

    void main() {
      vec3 viewDir  = normalize(cameraPosition - vWorldPos);
      float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 3.0);

      // Core color blends toward bright tinted-white at the rim
      vec3 rimColor = mix(uColor * 2.0, vec3(1.0), 0.4);
      vec3 col = mix(uColor * 0.6, rimColor, fresnel);

      // Subtle iridescent shimmer based on normal
      col += vec3(0.0, 0.02, 0.08) * (1.0 - fresnel) * uEnergy;

      // Overall brightness scales with energy
      col *= 0.8 + uEnergy * 0.6;

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

const orbGeo  = new THREE.SphereGeometry(1, 128, 128);
const orbMesh = new THREE.Mesh(orbGeo, orbMat);
scene.add(orbMesh);

// ── Mist Ring ────────────────────────────────────────────────────────────────
(function buildMist() {
  // Build a radial gradient texture via canvas
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0.0, 'rgba(30, 80, 180, 0.18)');
  g.addColorStop(0.4, 'rgba(20, 60, 160, 0.08)');
  g.addColorStop(1.0, 'rgba(0,  0,   0,  0.00)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);

  const mistMat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    opacity: 1,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
  });

  // 4 planes, rotated around the orb
  for (let i = 0; i < 4; i++) {
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(3.8, 3.8), mistMat);
    plane.rotation.x = Math.PI / 2;
    plane.rotation.z = (i / 4) * Math.PI;
    plane.position.y = -0.05 + (Math.random() - 0.5) * 0.3;
    scene.add(plane);
  }
})();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  // slow particle drift — rotate around Y very slightly
  scene.children.forEach(child => {
    if (child.isPoints) {
      child.rotation.y = t * 0.012;
      child.rotation.x = t * 0.005;
    }
  });

  orbUniforms.uTime.value = t;

  composer.render();
}
animate();

</script>
</body>
</html>
