<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferrofluid Orb</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030c22; overflow: hidden; }
    canvas { display: block; }
    #status {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.25); font-family: 'Courier New', monospace;
      font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
      pointer-events: none;
    }
    #ctrl-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      background: rgba(10,20,50,0.75); border: 1px solid rgba(80,140,255,0.25);
      color: rgba(180,210,255,0.7); font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 7px 14px; cursor: pointer; border-radius: 3px;
      backdrop-filter: blur(8px); transition: border-color 0.2s, color 0.2s;
    }
    #ctrl-toggle:hover { border-color: rgba(80,140,255,0.6); color: #fff; }
    #ctrl-panel {
      position: fixed; top: 52px; right: 20px; z-index: 99;
      background: rgba(5,12,34,0.92); border: 1px solid rgba(80,140,255,0.2);
      border-radius: 6px; width: 240px; max-height: calc(100vh - 80px);
      backdrop-filter: blur(14px); display: none; flex-direction: column;
      overflow: hidden;
    }
    #ctrl-panel.open { display: flex; }
    .tab-bar {
      display: flex; border-bottom: 1px solid rgba(80,140,255,0.15); flex-shrink: 0;
    }
    .tab-bar button {
      flex: 1; padding: 8px 0; background: none; border: none; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(120,160,255,0.45); transition: color 0.15s;
    }
    .tab-bar button.active { color: rgba(180,210,255,0.9); border-bottom: 1px solid rgba(80,140,255,0.6); }
    .tab-bar button:hover { color: rgba(180,210,255,0.7); }
    .tab-body {
      overflow-y: auto; padding: 12px 14px;
      display: none; flex-direction: column; gap: 9px;
    }
    .tab-body.active { display: flex; }
    .cp-section {
      font-family: 'Courier New', monospace; font-size: 9px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(80,140,255,0.4); margin-top: 6px;
    }
    .cp-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .cp-row label {
      font-family: 'Courier New', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(150,185,255,0.6); white-space: nowrap;
    }
    .cp-row input[type=color] {
      width: 36px; height: 22px; border: 1px solid rgba(80,140,255,0.3);
      border-radius: 3px; background: none; cursor: pointer; padding: 1px; flex-shrink: 0;
    }
    .sl-row {
      display: flex; flex-direction: column; gap: 3px;
    }
    .sl-head {
      display: flex; justify-content: space-between; align-items: baseline;
    }
    .sl-head label {
      font-family: 'Courier New', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(150,185,255,0.6);
    }
    .sl-head span {
      font-family: 'Courier New', monospace; font-size: 9px;
      color: rgba(100,150,255,0.5); min-width: 34px; text-align: right;
    }
    .sl-row input[type=range] {
      width: 100%; height: 3px; cursor: pointer; accent-color: rgba(80,140,255,0.8);
    }
  </style>
</head>
<body>
<div id="status">idle — T: think · S: speak · I: idle</div>
<button id="ctrl-toggle">Controls</button>
<div id="ctrl-panel">
  <div class="tab-bar">
    <button class="tab active" data-tab="colors">Color</button>
    <button class="tab"        data-tab="motion">Motion</button>
  </div>

  <!-- COLOR TAB -->
  <div class="tab-body active" id="tab-colors">
    <div class="cp-section">Scene</div>
    <div class="cp-row"><label>Background</label><input type="color" id="cp-bg"        value="#030c22"></div>
    <div class="cp-row"><label>Particles</label> <input type="color" id="cp-particles" value="#4080ff"></div>
    <div class="cp-section">Lighting</div>
    <div class="cp-row"><label>Ambient color</label><input type="color" id="cp-ambient" value="#0a1530"></div>
    <div class="sl-row"><div class="sl-head"><label>Ambient intensity</label><span id="v-aint">0.4</span></div><input type="range" id="sl-aint" min="0" max="3" step="0.05" value="0.4"></div>
    <div class="cp-section">Bob Blob</div>
    <div class="cp-row"><label>Idle color</label>   <input type="color" id="cp-base"       value="#0044dd"></div>
    <div class="cp-row"><label>Listening</label>    <input type="color" id="cp-listening"   value="#0099ff"></div>
    <div class="cp-row"><label>Thinking</label>     <input type="color" id="cp-thinking"    value="#ff6600"></div>
    <div class="cp-row"><label>Talking</label>      <input type="color" id="cp-talking"     value="#00ff88"></div>
    <div class="cp-row"><label>Valleys</label>      <input type="color" id="cp-valley"      value="#020918"></div>
    <div class="cp-row"><label>Mid surface</label>  <input type="color" id="cp-mid"         value="#003bc7"></div>
    <div class="cp-row"><label>Peaks</label>        <input type="color" id="cp-peak"        value="#14f273"></div>
    <div class="cp-row"><label>Rim glow</label>     <input type="color" id="cp-rim"         value="#0dd966"></div>
    <div class="cp-row"><label>Rim highlight</label><input type="color" id="cp-rim-high"    value="#33ffa8"></div>
  </div>

  <!-- EXPORT -->
  <div style="padding:10px 14px; border-bottom:1px solid rgba(80,140,255,0.15); flex-shrink:0; display:flex; gap:6px;">
    <button id="btn-export" style="flex:1; padding:7px 0; background:rgba(10,20,50,0.6); border:1px solid rgba(80,140,255,0.3); color:rgba(180,210,255,0.7); font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:border-color 0.2s,color 0.2s;">Export</button>
    <button id="btn-import" style="flex:1; padding:7px 0; background:rgba(10,20,50,0.6); border:1px solid rgba(80,140,255,0.3); color:rgba(180,210,255,0.7); font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:border-color 0.2s,color 0.2s;">Import</button>
    <input type="file" id="file-import" accept=".html,.json" style="display:none">
  </div>

  <!-- MOTION TAB -->
  <div class="tab-body" id="tab-motion">
    <div class="cp-section">Particles</div>
    <div class="sl-row"><div class="sl-head"><label>Drift speed</label><span id="v-pdrift">1.0</span></div><input type="range" id="sl-pdrift"   min="0" max="3"    step="0.05" value="1.0"></div>
    <div class="sl-row"><div class="sl-head"><label>Opacity</label>    <span id="v-popac">0.4</span></div><input type="range" id="sl-popac"    min="0" max="1"    step="0.02" value="0.4"></div>
    <div class="sl-row"><div class="sl-head"><label>Size scale</label> <span id="v-psize">1.0</span></div><input type="range" id="sl-psize"    min="0.2" max="4"  step="0.1"  value="1.0"></div>

    <div class="cp-section">Blob — Surface</div>
    <div class="sl-row"><div class="sl-head"><label>Spectrum gain</label><span id="v-sgain">1.00</span></div><input type="range" id="sl-sgain" min="0" max="3" step="0.05" value="1.0"></div>
    <div class="sl-row"><div class="sl-head"><label>L1 frequency</label><span id="v-n1f">1.8</span></div><input type="range" id="sl-n1f" min="0.2" max="6"   step="0.1"  value="1.8"></div>
    <div class="sl-row"><div class="sl-head"><label>L1 speed</label>    <span id="v-n1s">0.4</span></div><input type="range" id="sl-n1s" min="0"   max="3"   step="0.05" value="0.4"></div>
    <div class="sl-row"><div class="sl-head"><label>L1 amplitude</label><span id="v-n1a">0.02</span></div><input type="range" id="sl-n1a" min="0"  max="2.0" step="0.01" value="0.02"></div>
    <div class="sl-row"><div class="sl-head"><label>L2 frequency</label><span id="v-n2f">3.5</span></div><input type="range" id="sl-n2f" min="0.5" max="12"  step="0.1"  value="3.5"></div>
    <div class="sl-row"><div class="sl-head"><label>L2 speed</label>    <span id="v-n2s">0.7</span></div><input type="range" id="sl-n2s" min="0"   max="3"   step="0.05" value="0.7"></div>
    <div class="sl-row"><div class="sl-head"><label>L2 amplitude</label><span id="v-n2a">0.01</span></div><input type="range" id="sl-n2a" min="0"  max="1.2" step="0.01" value="0.01"></div>
    <div class="sl-row"><div class="sl-head"><label>L3 frequency</label><span id="v-n3f">7.0</span></div><input type="range" id="sl-n3f" min="1"   max="20"  step="0.5"  value="7.0"></div>
    <div class="sl-row"><div class="sl-head"><label>L3 speed</label>    <span id="v-n3s">1.1</span></div><input type="range" id="sl-n3s" min="0"   max="4"   step="0.05" value="1.1"></div>
    <div class="sl-row"><div class="sl-head"><label>L3 amplitude</label><span id="v-n3a">0.005</span></div><input type="range" id="sl-n3a" min="0"  max="0.6" step="0.01" value="0.005"></div>

    <div class="cp-section">Blob — Lighting</div>
    <div class="sl-row"><div class="sl-head"><label>Fresnel power</label><span id="v-fres">3.0</span></div><input type="range" id="sl-fres"  min="0.5" max="10"  step="0.1"  value="3.0"></div>
    <div class="sl-row"><div class="sl-head"><label>Peak width</label>  <span id="v-pkwd">0.5</span></div><input type="range" id="sl-pkwd"  min="0.1" max="2"   step="0.05" value="0.5"></div>
    <div class="sl-row"><div class="sl-head"><label>Peak blend</label>  <span id="v-pkbl">0.65</span></div><input type="range" id="sl-pkbl" min="0"   max="1"   step="0.01" value="0.65"></div>
    <div class="sl-row"><div class="sl-head"><label>Rim blend</label>   <span id="v-ribl">0.75</span></div><input type="range" id="sl-ribl" min="0"   max="1"   step="0.01" value="0.75"></div>
    <div class="sl-row"><div class="sl-head"><label>Brightness</label>  <span id="v-brit">0.5</span></div><input type="range" id="sl-brit"  min="0"   max="2"   step="0.02" value="0.5"></div>

    <div class="cp-section">Blob — Animation</div>
    <div class="sl-row"><div class="sl-head"><label>Transition spd</label><span id="v-lerp">0.025</span></div><input type="range" id="sl-lerp"   min="0.002" max="0.15" step="0.002" value="0.025"></div>
    <div class="sl-row"><div class="sl-head"><label>Orb rotation</label>  <span id="v-oroty">0</span></div><input type="range" id="sl-oroty" min="0" max="360" step="1" value="0"></div>
    <div class="sl-row"><div class="sl-head"><label>Talk pulse spd</label><span id="v-tkps">7.0</span></div><input type="range"  id="sl-tkps"   min="0.5"   max="20"   step="0.5"   value="7.0"></div>
    <div class="sl-row"><div class="sl-head"><label>Talk pulse amt</label><span id="v-tkpa">0.12</span></div><input type="range" id="sl-tkpa"   min="0"     max="0.5"  step="0.01"  value="0.12"></div>
    <div class="sl-row"><div class="sl-head"><label>Think pulse spd</label><span id="v-thps">2.5</span></div><input type="range" id="sl-thps"  min="0.2"   max="10"   step="0.1"   value="2.5"></div>
    <div class="sl-row"><div class="sl-head"><label>Think pulse amt</label><span id="v-thpa">0.08</span></div><input type="range" id="sl-thpa" min="0"     max="0.3"  step="0.005" value="0.08"></div>

    <div class="cp-section">Arcs</div>
    <div class="sl-row"><div class="sl-head"><label>Spawn rate</label>    <span id="v-aspn">0.35</span></div><input type="range" id="sl-aspn" min="0"   max="2"    step="0.05"  value="0.35"></div>
    <div class="sl-row"><div class="sl-head"><label>Max distance</label>  <span id="v-adst">3.16</span></div><input type="range" id="sl-adst" min="0.5" max="10"   step="0.1"   value="3.16"></div>

    <div class="sl-row"><div class="sl-head"><label>Scale</label>         <span id="v-bobs">1.0</span></div><input type="range"  id="sl-bobs" min="0.2" max="3"    step="0.05"  value="1.0"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030c22);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);


// ── Post-processing ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.4,   // strength
  0.4,   // radius
  0.1    // threshold
);
composer.addPass(bloomPass);

// ── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloomPass.setSize(innerWidth, innerHeight);
});

// ── Clock & animate ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();

let particleMat;       // exposed for color panel
let particleMesh;      // exposed for arc system (rotates with particles)
let particlePositions; // raw Float32Array of particle positions (local space)

// ── Particles (sparkly void) ─────────────────────────────────────────────────
(function buildParticles() {
  const COUNT = 2200;
  particlePositions = new Float32Array(COUNT * 3);
  const positions = particlePositions;
  const sizes     = new Float32Array(COUNT);
  const alphas    = new Float32Array(COUNT);

  for (let i = 0; i < COUNT; i++) {
    // distribute in a shell between r=2.5 and r=7
    const r     = 2.5 + Math.random() * 4.5;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(-Math.random());
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
    sizes[i]  = 0.5 + Math.random() * 1.5;
    alphas[i] = 0.2 + Math.random() * 0.7;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aAlpha',   new THREE.BufferAttribute(alphas, 1));

  particleMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
      uParticleColor:   { value: new THREE.Color(0x4080ff) },
      uParticleOpacity: { value: 0.4 },
      uParticleSize:    { value: 1.0 },
    },
    vertexShader: `
      uniform float uParticleSize;
      attribute float aSize;
      attribute float aAlpha;
      varying float vAlpha;
      void main() {
        vAlpha = aAlpha;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = clamp(aSize * uParticleSize * (300.0 / -mv.z), 1.0, 128.0);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      uniform vec3  uParticleColor;
      uniform float uParticleOpacity;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float a = smoothstep(0.5, 0.1, d) * vAlpha * uParticleOpacity;
        gl_FragColor = vec4(uParticleColor, a);
      }
    `,
  });

  particleMesh = new THREE.Points(geo, particleMat);
  scene.add(particleMesh);
})();

// ── Ferrofluid Orb ───────────────────────────────────────────────────────────
const GLSL_SIMPLEX = /* glsl */`
  vec3 mod289v3(vec3 x) { return x - floor(x*(1./289.))*289.; }
  vec4 mod289v4(vec4 x) { return x - floor(x*(1./289.))*289.; }
  vec4 permute(vec4 x) { return mod289v4(((x*34.)+1.)*x); }
  vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314*r; }

  float snoise(vec3 v) {
    const vec2 C = vec2(1./6., 1./3.);
    const vec4 D = vec4(0., 0.5, 1., 2.);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g  = step(x0.yzx, x0.xyz);
    vec3 l  = 1. - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289v3(i);
    vec4 p = permute(permute(permute(
      i.z + vec4(0., i1.z, i2.z, 1.))
      + i.y + vec4(0., i1.y, i2.y, 1.))
      + i.x + vec4(0., i1.x, i2.x, 1.));
    float n_ = .142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.*floor(p*ns.z*ns.z);
    vec4 x_ = floor(j*ns.z);
    vec4 y_ = floor(j - 7.*x_);
    vec4 x = x_*ns.x + ns.yyyy;
    vec4 y = y_*ns.x + ns.yyyy;
    vec4 h = 1. - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.+1.;
    vec4 s1 = floor(b1)*2.+1.;
    vec4 sh = -step(h, vec4(0.));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy,h.x);
    vec3 p1 = vec3(a0.zw,h.y);
    vec3 p2 = vec3(a1.xy,h.z);
    vec3 p3 = vec3(a1.zw,h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
    vec4 m = max(.6 - vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)), 0.);
    m = m*m;
    return 42.*dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }
`;

// ── Spectrum Analyser ──────────────────────────────────────────────────────
const SPECTRUM_BANDS = 64;
const FREQ_MIN       = 80;
const FREQ_MAX       = 12000;

// 64×1 float texture — updated every frame with FFT amplitudes
const freqTexData = new Float32Array(SPECTRUM_BANDS);
const freqTex = new THREE.DataTexture(
  freqTexData,
  SPECTRUM_BANDS,  // width
  1,               // height
  THREE.RedFormat,
  THREE.FloatType
);
freqTex.minFilter = THREE.LinearFilter;
freqTex.magFilter = THREE.LinearFilter;
freqTex.needsUpdate = true;

// Per-band FFT bin ranges — computed once mic is initialized
let bandBins = null;

function buildBandBins(sampleRate, fftSize) {
  const binHz = sampleRate / fftSize;
  const result = [];
  for (let i = 0; i < SPECTRUM_BANDS; i++) {
    const t0 = i / SPECTRUM_BANDS;
    const t1 = (i + 1) / SPECTRUM_BANDS;
    const f0 = FREQ_MIN * Math.pow(FREQ_MAX / FREQ_MIN, t0);
    const f1 = FREQ_MIN * Math.pow(FREQ_MAX / FREQ_MIN, t1);
    const b0 = Math.max(0, Math.floor(f0 / binHz));
    const b1 = Math.min(fftSize / 2 - 1, Math.ceil(f1 / binHz));
    result.push([b0, Math.max(b0, b1)]);
  }
  return result;
}

const orbUniforms = {
  uTime:           { value: 0 },
  uEnergy:         { value: 0.15 },
  uColor:          { value: new THREE.Color(0x0044dd) },
  uValleyColor:    { value: new THREE.Color(0x020918) },
  uMidColor:       { value: new THREE.Color(0x003bc7) },
  uPeakColor:      { value: new THREE.Color(0x14f273) },
  uRimColor:       { value: new THREE.Color(0x0dd966) },
  uRimHighColor:   { value: new THREE.Color(0x33ffa8) },
  // noise layer params
  uN1F: { value: 1.8 }, uN1S: { value: 0.40 }, uN1A: { value: 0.02 },
  uN2F: { value: 3.5 }, uN2S: { value: 0.70 }, uN2A: { value: 0.01 },
  uN3F: { value: 7.0 }, uN3S: { value: 1.10 }, uN3A: { value: 0.005 },
  // lighting params
  uFresnelPow: { value: 3.0 },
  uPeakWidth:  { value: 0.5 },
  uPeakBlend:  { value: 0.65 },
  uRimBlend:   { value: 0.75 },
  uBrightness: { value: 0.5 },
  uFreqTex:      { value: freqTex },
  uSpectrumGain: { value: 1.0 },
};

const orbMat = new THREE.ShaderMaterial({
  uniforms: orbUniforms,
  vertexShader: /* glsl */`
    ${GLSL_SIMPLEX}
    uniform float uTime;
    uniform float uEnergy;
    uniform float uN1F; uniform float uN1S; uniform float uN1A;
    uniform float uN2F; uniform float uN2S; uniform float uN2A;
    uniform float uN3F; uniform float uN3S; uniform float uN3A;
    uniform sampler2D uFreqTex;
    uniform float uSpectrumGain;
    varying vec3  vNormal;
    varying vec3  vWorldPos;
    varying float vDisp;
    varying float vFreqAmp;
    varying float vEdgeFactor;

    float noiseDisp(vec3 q) {
      return (snoise(q * uN1F + uTime * uN1S) * uN1A
            + snoise(q * uN2F + uTime * uN2S) * uN2A
            + snoise(q * uN3F + uTime * uN3S) * uN3A) * uEnergy;
    }

    void main() {
      vec3 p = position;

      float disp = noiseDisp(p);
      vec3 displaced = p + normal * disp;

      // Approximate displaced normal via finite differences
      vec3 tangent   = normalize(cross(normal, vec3(0.0, 1.0, 0.0001)));
      vec3 bitangent = cross(normal, tangent);
      float eps = 0.02;
      float dx = (noiseDisp(p + tangent * eps) - noiseDisp(p - tangent * eps)) / (2.0 * eps);
      float dy = (noiseDisp(p + bitangent * eps) - noiseDisp(p - bitangent * eps)) / (2.0 * eps);
      vec3 displacedNormal = normalize(normal - dx * tangent - dy * bitangent);

      vNormal   = normalize(normalMatrix * displacedNormal);
      vWorldPos = (modelMatrix * vec4(displaced, 1.0)).xyz;
      vDisp     = disp;

    // ── Spectrum ring deformation ─────────────────────────────────────────
    // Clockwise angle from +Y axis (top = 12 o'clock) in [0, 2PI)
    const float PI     = 3.14159265358979;
    const float TWO_PI = 6.28318530717959;
    float angle = mod(PI * 0.5 - atan(position.y, position.x), TWO_PI);
    float bandFrac = angle / TWO_PI;  // 0=top, 0.25=right, 0.5=bottom, 0.75=left

    // Sample the frequency texture for this angular position
    float fAmp = texture2D(uFreqTex, vec2(bandFrac, 0.5)).r * uSpectrumGain * uEnergy * 2.0;

    // Silhouette proximity — max at z≈0 (equatorial ring when front-facing), zero at poles
    float eFactor = pow(1.0 - abs(position.z), 3.0);

    // Radial outward direction in XY plane (safe against pole singularity)
    float rxy = length(position.xy);
    vec2 radialDir = (rxy > 0.001) ? position.xy / rxy : vec2(0.0);

    // Displace vertices radially outward at their frequency amplitude
    displaced += vec3(radialDir, 0.0) * fAmp * eFactor * 0.5;

    // Pass to fragment shader
    vFreqAmp    = fAmp;
    vEdgeFactor = eFactor;

      gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    uniform vec3  uColor;
    uniform float uEnergy;
    uniform vec3  uValleyColor;
    uniform vec3  uMidColor;
    uniform vec3  uPeakColor;
    uniform vec3  uRimColor;
    uniform vec3  uRimHighColor;
    uniform float uFresnelPow;
    uniform float uPeakWidth;
    uniform float uPeakBlend;
    uniform float uRimBlend;
    uniform float uBrightness;
    varying vec3  vNormal;
    varying vec3  vWorldPos;
    varying float vDisp;
    varying float vFreqAmp;
    varying float vEdgeFactor;

    void main() {
      vec3 viewDir  = normalize(cameraPosition - vWorldPos);
      float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), uFresnelPow);

      float safeEnergy = max(uEnergy, 0.001);
      float peakRaw    = clamp(vDisp / (0.45 * safeEnergy), -1.0, 1.0);
      float peakFactor = pow(max(peakRaw, 0.0), uPeakWidth);

      vec3 peakColor  = mix(uMidColor, uPeakColor, peakFactor * uPeakBlend);
      vec3 surfaceCol = mix(uValleyColor, peakColor, peakFactor);

      vec3 rimColor = mix(uRimColor, uRimHighColor, fresnel);
      vec3 col      = mix(surfaceCol, rimColor, fresnel * uRimBlend);

      col *= (0.55 + uEnergy * 0.55) * uBrightness;

      // Spectrum glow — brighten active frequency bands at the silhouette
      float specGlow = vFreqAmp * vEdgeFactor;
      col += vec3(0.4, 0.7, 1.0) * specGlow * 0.8;   // cool blue-white additive
      col += uColor * specGlow * 0.4;                  // tinted by current state color

      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

const orbGeo  = new THREE.SphereGeometry(1, 128, 128);
const orbMesh = new THREE.Mesh(orbGeo, orbMat);
scene.add(orbMesh);

// Subtle fill light so particles catch a little warmth
const ambient = new THREE.AmbientLight(0x0a1530, 0.4);
scene.add(ambient);

// ── Mist Ring ────────────────────────────────────────────────────────────────
(function buildMist() {
  // Build a radial gradient texture via canvas
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0.0, 'rgba(30, 80, 180, 0.18)');
  g.addColorStop(0.4, 'rgba(20, 60, 160, 0.08)');
  g.addColorStop(1.0, 'rgba(0,  0,   0,  0.00)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);

  const mistMat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    opacity: 1,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
  });

  // 4 planes, rotated around the orb
  for (let i = 0; i < 4; i++) {
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(3.8, 3.8), mistMat);
    plane.rotation.z = (i / 4) * Math.PI;
    plane.position.z = -0.1 + (Math.random() - 0.5) * 0.2;
    scene.add(plane);
  }
})();

// ── Electrical Arcs ──────────────────────────────────────────────────────────
const ARC_COUNT  = 32;
const ARC_SEGS   = 8;                          // segments per arc
const ARC_VERTS  = ARC_COUNT * ARC_SEGS * 2;  // 2 verts per segment (LineSegments)

const _arcPosBuf = new Float32Array(ARC_VERTS * 3);
const _arcAlpBuf = new Float32Array(ARC_VERTS);
const _arcPts    = new Float32Array((ARC_SEGS + 1) * 3); // scratch: one arc's points

const arcGeo = new THREE.BufferGeometry();
arcGeo.setAttribute('position', new THREE.BufferAttribute(_arcPosBuf, 3).setUsage(THREE.DynamicDrawUsage));
arcGeo.setAttribute('aAlpha',   new THREE.BufferAttribute(_arcAlpBuf, 1).setUsage(THREE.DynamicDrawUsage));

const arcMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute float aAlpha;
    varying float vAlpha;
    void main() {
      vAlpha = aAlpha;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    void main() {
      gl_FragColor = vec4(0.55, 0.88, 1.0, vAlpha);
    }
  `,
});

// Arc mesh is a child of particleMesh so it rotates with the star field
const arcLines = new THREE.LineSegments(arcGeo, arcMat);
particleMesh.add(arcLines);

// Pool of arc state objects
const arcPool = Array.from({ length: ARC_COUNT }, () => ({
  on: false, i1: 0, i2: 0, born: 0, life: 0, seed: 0,
}));

const PARTICLE_COUNT = 2200;
let arcMaxDist    = 3.16;  // max connection distance (units); d2 = arcMaxDist²
let arcLifeBase   = 0.12;  // min arc lifetime (s)
let arcLifeRange  = 0.45;  // additional random lifetime range (s)
let arcSpawnBase  = 0.35;  // base spawn probability per frame
let arcJitter     = 1.0;   // jitter scale multiplier
let arcFlickerSpd = 48;    // flicker sine frequency
let arcOpacity    = 0.75;  // peak arc alpha
let bobSize       = 1.0;   // orb scale

function spawnArc(t) {
  const slot = arcPool.findIndex(a => !a.on);
  if (slot < 0 || !particlePositions) return;

  const i1 = (Math.random() * PARTICLE_COUNT) | 0;
  const x1 = particlePositions[i1*3], y1 = particlePositions[i1*3+1], z1 = particlePositions[i1*3+2];

  let best = arcMaxDist * arcMaxDist, i2 = -1;
  for (let k = 0; k < 18; k++) {
    const j = (Math.random() * PARTICLE_COUNT) | 0;
    if (j === i1) continue;
    const dx = particlePositions[j*3]-x1, dy = particlePositions[j*3+1]-y1, dz = particlePositions[j*3+2]-z1;
    const d2 = dx*dx + dy*dy + dz*dz;
    if (d2 < best) { best = d2; i2 = j; }
  }
  if (i2 < 0) return;

  const a = arcPool[slot];
  a.on   = true;
  a.i1   = i1;  a.i2 = i2;
  a.born = t;
  a.life = arcLifeBase + Math.random() * arcLifeRange;
  a.seed = Math.random() * 314;
}

const _ap1 = new THREE.Vector3();
const _ap2 = new THREE.Vector3();

function updateArcs(t) {
  for (let ai = 0; ai < ARC_COUNT; ai++) {
    const arc  = arcPool[ai];
    const vBase = ai * ARC_SEGS * 2;   // base vertex index
    const pBase = vBase * 3;            // base float index in position buffer

    if (!arc.on) {
      for (let v = vBase; v < vBase + ARC_SEGS * 2; v++) _arcAlpBuf[v] = 0;
      continue;
    }

    const norm = (t - arc.born) / arc.life;
    if (norm >= 1.0) { arc.on = false; continue; }

    // Fast fade in, hold, fade out — with high-freq flicker
    let alpha = norm < 0.12 ? norm / 0.12 : norm > 0.72 ? (1 - norm) / 0.28 : 1.0;
    alpha *= 0.55 + 0.45 * Math.abs(Math.sin(t * arcFlickerSpd + arc.seed));
    alpha *= arcOpacity;

    _ap1.set(particlePositions[arc.i1*3], particlePositions[arc.i1*3+1], particlePositions[arc.i1*3+2]);
    _ap2.set(particlePositions[arc.i2*3], particlePositions[arc.i2*3+1], particlePositions[arc.i2*3+2]);

    const dx = _ap2.x-_ap1.x, dy = _ap2.y-_ap1.y, dz = _ap2.z-_ap1.z;
    const len = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    const nx = dx/len, ny = dy/len, nz = dz/len;

    // Build two perpendicular axes for jitter
    let px, py, pz;
    if (Math.abs(ny) < 0.9) { const s = 1/Math.sqrt(nz*nz+nx*nx)||1; px=-nz*s; py=0;    pz=nx*s;  }
    else                     { const s = 1/Math.sqrt(ny*ny+nz*nz)||1; px=0;    py=nz*s; pz=-ny*s; }
    const qx=ny*pz-nz*py, qy=nz*px-nx*pz, qz=nx*py-ny*px;

    // Generate ARC_SEGS+1 points along the arc with animated jitter
    for (let i = 0; i <= ARC_SEGS; i++) {
      const u   = i / ARC_SEGS;
      const env = Math.sin(u * Math.PI);                                    // taper at endpoints
      const o1  = Math.sin(t*19 + arc.seed*3.3 + u*12.57) * 0.28 * arcJitter * env * len;
      const o2  = Math.cos(t*29 + arc.seed*1.9 + u*18.85) * 0.16 * arcJitter * env * len;
      _arcPts[i*3]   = _ap1.x + dx*u + px*o1 + qx*o2;
      _arcPts[i*3+1] = _ap1.y + dy*u + py*o1 + qy*o2;
      _arcPts[i*3+2] = _ap1.z + dz*u + pz*o1 + qz*o2;
    }

    // Write as segment pairs (LineSegments format)
    for (let s = 0; s < ARC_SEGS; s++) {
      const fi  = pBase + s * 6;
      const vi0 = vBase + s * 2;
      _arcPosBuf[fi]   = _arcPts[s*3];     _arcPosBuf[fi+1] = _arcPts[s*3+1]; _arcPosBuf[fi+2] = _arcPts[s*3+2];
      _arcPosBuf[fi+3] = _arcPts[(s+1)*3]; _arcPosBuf[fi+4] = _arcPts[(s+1)*3+1]; _arcPosBuf[fi+5] = _arcPts[(s+1)*3+2];
      _arcAlpBuf[vi0]   = alpha;
      _arcAlpBuf[vi0+1] = alpha;
    }
  }

  arcGeo.attributes.position.needsUpdate = true;
  arcGeo.attributes.aAlpha.needsUpdate   = true;
}

// ── State Machine ────────────────────────────────────────────────────────────
const STATES = {
  idle:      { color: new THREE.Color(0x0044dd), energy: 0.15, bloomStr: 1.1 },
  listening: { color: new THREE.Color(0x0099ff), energy: 0.50, bloomStr: 1.4 },
  thinking:  { color: new THREE.Color(0xff6600), energy: 0.62, bloomStr: 1.6 },
  talking:   { color: new THREE.Color(0x00ff88), energy: 0.78, bloomStr: 1.8 },
};

let state        = 'idle';
let targetColor  = STATES.idle.color.clone();
let targetEnergy = STATES.idle.energy;
let targetBloom  = STATES.idle.bloomStr;
const lerpColor = STATES.idle.color.clone();

function setState(name) {
  if (!STATES[name]) return;
  if (name === 'idle' || name === 'listening') silenceFrames = 0;
  state = name;
  targetColor.copy(STATES[name].color);
  targetEnergy = STATES[name].energy;
  targetBloom  = STATES[name].bloomStr;
  document.getElementById('status').textContent =
    name === 'idle'      ? 'idle — T: think · S: speak · I: idle' :
    name === 'listening' ? 'listening...' :
    name === 'thinking'  ? 'thinking...' :
                           'speaking...';
}

window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 't') setState('thinking');
  if (k === 's') setState('talking');
  if (k === 'i') setState('idle');
});

// ── Mic Input ────────────────────────────────────────────────────────────────
let analyser      = null;
let freqData      = null;
let micActive     = false;
const MIC_THRESHOLD     = 0.018;
const MIC_SILENCE_FRAMES = 45;
let silenceFrames = 0;

async function initMic() {
  try {
    const stream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const ctx     = new AudioContext();
    await ctx.resume();
    const source  = ctx.createMediaStreamSource(stream);
    analyser      = ctx.createAnalyser();
    analyser.fftSize = 2048;
    source.connect(analyser);
    freqData   = new Uint8Array(analyser.frequencyBinCount);  // 1024 entries
    bandBins   = buildBandBins(ctx.sampleRate, analyser.fftSize);
    micActive = true;
    console.log('[orb] mic initialized');
  } catch (err) {
    console.warn('[orb] mic not available:', err.message);
  }
}

function getMicAmplitude() {
  if (!analyser) return 0;
  let sum = 0;
  for (let i = 0; i < freqData.length; i++) sum += freqData[i] * freqData[i];
  return Math.sqrt(sum / freqData.length) / 255;
}

function updateFreqTexture() {
  if (!analyser || !bandBins) {
    // No mic yet — decay texture to zero
    for (let i = 0; i < SPECTRUM_BANDS; i++) freqTexData[i] *= 0.85;
    freqTex.needsUpdate = true;
    return;
  }
  analyser.getByteFrequencyData(freqData);
  for (let i = 0; i < SPECTRUM_BANDS; i++) {
    const [b0, b1] = bandBins[i];
    let sum = 0;
    for (let b = b0; b <= b1; b++) sum += freqData[b];
    const raw = sum / Math.max(1, b1 - b0 + 1) / 255;
    // Asymmetric smoothing: fast attack, slow decay
    freqTexData[i] = freqTexData[i] < raw
      ? raw * 0.6 + freqTexData[i] * 0.4      // attack
      : raw * 0.15 + freqTexData[i] * 0.85;   // decay
  }
  freqTex.needsUpdate = true;
}

initMic();

let LERP_SPEED    = 0.025;
let particleDrift = 1.0;   // multiplier on drift rotation speeds
let orbRotationY  = 0;  // radians — set by slider, no auto-spin
let talkPulseSpd  = 7.0;
let talkPulseAmt  = 0.12;
let thinkPulseSpd = 2.5;
let thinkPulseAmt = 0.08;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  updateFreqTexture();   // populates freqData once per frame — must run before any consumer
  // Mic amplitude → listening state
  if (micActive && (state === 'idle' || state === 'listening')) {
    const amp = getMicAmplitude();
    if (amp > MIC_THRESHOLD) {
      silenceFrames = 0;
      if (state !== 'listening') setState('listening');
      // Drive energy from mic amplitude — map 0..0.2 → 0.3..0.95
      targetEnergy = 0.30 + Math.min(amp / 0.2, 1.0) * 0.65;
      // Shift color toward green as amplitude increases
      const greenAmount = Math.min(amp / 0.15, 1.0);
      targetColor.setRGB(
        0.0,
        0.6 * (1 - greenAmount) + 1.0 * greenAmount,
        1.0 * (1 - greenAmount) + 0.53 * greenAmount,
      );
    } else {
      silenceFrames++;
      if (state === 'listening' && silenceFrames > MIC_SILENCE_FRAMES) {
        setState('idle');
      }
    }
  }

  // Particle drift
  if (particleMesh) {
    particleMesh.rotation.y = t * 0.012 * particleDrift;
    particleMesh.rotation.x = t * 0.005 * particleDrift;
  }

  // Electrical arcs — spawn rate scales with orb energy
  orbMesh.scale.setScalar(bobSize);
  const spawnChance = arcSpawnBase + orbUniforms.uEnergy.value * 0.55;
  if (Math.random() < spawnChance) spawnArc(t);
  updateArcs(t);

  // Talking: simulate pulsing energy
  let energyTarget = targetEnergy;
  if (state === 'talking') {
    energyTarget = targetEnergy + Math.sin(t * talkPulseSpd) * talkPulseAmt;
  }
  if (state === 'thinking') {
    energyTarget = targetEnergy + Math.sin(t * thinkPulseSpd) * thinkPulseAmt;
  }

  // Lerp orb uniforms
  orbUniforms.uEnergy.value += (energyTarget - orbUniforms.uEnergy.value) * LERP_SPEED * 3;
  lerpColor.lerp(targetColor, LERP_SPEED * 2);
  orbUniforms.uColor.value.copy(lerpColor);
  orbUniforms.uTime.value = t;

  // Lerp bloom
  bloomPass.strength += (targetBloom - bloomPass.strength) * LERP_SPEED * 2;

  // Static rotation — user-controlled, no auto-spin
  orbMesh.rotation.y = orbRotationY;
  orbMesh.rotation.x = 0;

  composer.render();
}
animate();

sl('sl-n1f', 'v-n1f', v => orbUniforms.uN1F.value = v);
sl('sl-n1s', 'v-n1s', v => orbUniforms.uN1S.value = v);
sl('sl-n1a', 'v-n1a', v => orbUniforms.uN1A.value = v);
sl('sl-n2f', 'v-n2f', v => orbUniforms.uN2F.value = v);

sl('sl-n3s', 'v-n3s', v => orbUniforms.uN3S.value = v);
sl('sl-n3a', 'v-n3a', v => orbUniforms.uN3A.value = v);

// Blob lighting sliders
sl('sl-fres', 'v-fres', v => orbUniforms.uFresnelPow.value = v);
sl('sl-pkwd', 'v-pkwd', v => orbUniforms.uPeakWidth.value  = v);
sl('sl-pkbl', 'v-pkbl', v => orbUniforms.uPeakBlend.value  = v);
sl('sl-ribl', 'v-ribl', v => orbUniforms.uRimBlend.value   = v);
sl('sl-brit', 'v-brit', v => orbUniforms.uBrightness.value = v);

// Blob animation sliders
sl('sl-lerp', 'v-lerp', v => LERP_SPEED    = v);
sl('sl-oroty', 'v-oroty', v => orbRotationY = v * Math.PI / 180);
sl('sl-tkps', 'v-tkps', v => talkPulseSpd  = v);
sl('sl-tkpa', 'v-tkpa', v => talkPulseAmt  = v);
sl('sl-thps', 'v-thps', v => thinkPulseSpd = v);
sl('sl-thpa', 'v-thpa', v => thinkPulseAmt = v);

// Arc sliders
sl('sl-aspn', 'v-aspn', v => arcSpawnBase  = v);
sl('sl-adst', 'v-adst', v => arcMaxDist    = v);
sl('sl-alfe', 'v-alfe', v => arcLifeBase   = v);
sl('sl-alfr', 'v-alfr', v => arcLifeRange  = v);
sl('sl-ajit', 'v-ajit', v => arcJitter     = v);
sl('sl-aflk', 'v-aflk', v => arcFlickerSpd = v);
sl('sl-aopc', 'v-aopc', v => arcOpacity    = v);

// Bob size
sl('sl-bobs', 'v-bobs', v => bobSize = v);

// ── Export Template ───────────────────────────────────────────────────────────
function getConfig() {
  const hex = c => '#' + c.getHexString();
  return {
    bg:              hex(scene.background),
    ambientColor:    hex(ambient.color),
    ambientIntensity: ambient.intensity,
    particleColor:   hex(particleMat.uniforms.uParticleColor.value),
    particleOpacity: particleMat.uniforms.uParticleOpacity.value,
    particleSize:    particleMat.uniforms.uParticleSize.value,
    valleyColor:     hex(orbUniforms.uValleyColor.value),
    midColor:        hex(orbUniforms.uMidColor.value),
    peakColor:       hex(orbUniforms.uPeakColor.value),
    rimColor:        hex(orbUniforms.uRimColor.value),
    rimHighColor:    hex(orbUniforms.uRimHighColor.value),
    n1f: orbUniforms.uN1F.value, n1s: orbUniforms.uN1S.value, n1a: orbUniforms.uN1A.value,
    n2f: orbUniforms.uN2F.value, n2s: orbUniforms.uN2S.value, n2a: orbUniforms.uN2A.value,
    n3f: orbUniforms.uN3F.value, n3s: orbUniforms.uN3S.value, n3a: orbUniforms.uN3A.value,
    fresnelPow: orbUniforms.uFresnelPow.value,
    peakWidth:  orbUniforms.uPeakWidth.value,
    peakBlend:  orbUniforms.uPeakBlend.value,
    rimBlend:   orbUniforms.uRimBlend.value,
    brightness: orbUniforms.uBrightness.value,
    spectrumGain: orbUniforms.uSpectrumGain.value,
    idleColor:      hex(STATES.idle.color),
    listeningColor: hex(STATES.listening.color),
    thinkingColor:  hex(STATES.thinking.color),
    talkingColor:   hex(STATES.talking.color),
    lerpSpeed: LERP_SPEED, particleDrift, orbRotationDeg: orbRotationY * 180 / Math.PI,
    talkPulseSpd, talkPulseAmt, thinkPulseSpd, thinkPulseAmt,
    arcMaxDist, arcLifeBase, arcLifeRange, arcSpawnBase,
    arcJitter, arcFlickerSpd, arcOpacity, bobSize,
  };
}

function syncSlider(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.value = val;
  const ve = document.getElementById('v-' + id.slice(3));
  if (ve) ve.textContent = parseFloat(val).toFixed(
    el.step.includes('.') ? el.step.split('.')[1].length : 0
  );
}

function applyConfig(cfg) {
  if (cfg.bg)             { scene.background.set(cfg.bg); document.body.style.background = cfg.bg; document.getElementById('cp-bg').value = cfg.bg; }
  if (cfg.ambientColor)   { ambient.color.set(cfg.ambientColor); document.getElementById('cp-ambient').value = cfg.ambientColor; }
  if (cfg.ambientIntensity != null) { ambient.intensity = cfg.ambientIntensity; syncSlider('sl-aint', cfg.ambientIntensity); }
  if (cfg.particleColor)  { particleMat.uniforms.uParticleColor.value.set(cfg.particleColor);   document.getElementById('cp-particles').value = cfg.particleColor; }
  if (cfg.valleyColor)    { orbUniforms.uValleyColor.value.set(cfg.valleyColor);                 document.getElementById('cp-valley').value    = cfg.valleyColor; }
  if (cfg.midColor)       { orbUniforms.uMidColor.value.set(cfg.midColor);                       document.getElementById('cp-mid').value       = cfg.midColor; }
  if (cfg.peakColor)      { orbUniforms.uPeakColor.value.set(cfg.peakColor);                     document.getElementById('cp-peak').value      = cfg.peakColor; }
  if (cfg.rimColor)       { orbUniforms.uRimColor.value.set(cfg.rimColor);                       document.getElementById('cp-rim').value       = cfg.rimColor; }
  if (cfg.rimHighColor)   { orbUniforms.uRimHighColor.value.set(cfg.rimHighColor);               document.getElementById('cp-rim-high').value  = cfg.rimHighColor; }
  if (cfg.idleColor)      { STATES.idle.color.set(cfg.idleColor);           document.getElementById('cp-base').value      = cfg.idleColor;      if (state === 'idle')      targetColor.copy(STATES.idle.color);      }
  if (cfg.listeningColor) { STATES.listening.color.set(cfg.listeningColor); document.getElementById('cp-listening').value = cfg.listeningColor; if (state === 'listening') targetColor.copy(STATES.listening.color); }
  if (cfg.thinkingColor)  { STATES.thinking.color.set(cfg.thinkingColor);   document.getElementById('cp-thinking').value  = cfg.thinkingColor;  if (state === 'thinking')  targetColor.copy(STATES.thinking.color);  }
  if (cfg.talkingColor)   { STATES.talking.color.set(cfg.talkingColor);     document.getElementById('cp-talking').value   = cfg.talkingColor;   if (state === 'talking')   targetColor.copy(STATES.talking.color);   }

  const nums = [
    ['sl-popac', 'particleOpacity', v => particleMat.uniforms.uParticleOpacity.value = v],
    ['sl-psize', 'particleSize',    v => particleMat.uniforms.uParticleSize.value    = v],
    ['sl-pdrift','particleDrift',   v => particleDrift   = v],
    ['sl-sgain', 'spectrumGain', v => orbUniforms.uSpectrumGain.value = v],
    ['sl-n1f', 'n1f', v => orbUniforms.uN1F.value = v],
    ['sl-n1s', 'n1s', v => orbUniforms.uN1S.value = v],
    ['sl-n1a', 'n1a', v => orbUniforms.uN1A.value = v],
    ['sl-n2f', 'n2f', v => orbUniforms.uN2F.value = v],
    ['sl-n2s', 'n2s', v => orbUniforms.uN2S.value = v],
    ['sl-n2a', 'n2a', v => orbUniforms.uN2A.value = v],
    ['sl-n3f', 'n3f', v => orbUniforms.uN3F.value = v],
    ['sl-n3s', 'n3s', v => orbUniforms.uN3S.value = v],
    ['sl-n3a', 'n3a', v => orbUniforms.uN3A.value = v],
    ['sl-fres', 'fresnelPow', v => orbUniforms.uFresnelPow.value = v],
    ['sl-pkwd', 'peakWidth',  v => orbUniforms.uPeakWidth.value  = v],
    ['sl-pkbl', 'peakBlend',  v => orbUniforms.uPeakBlend.value  = v],
    ['sl-ribl', 'rimBlend',   v => orbUniforms.uRimBlend.value   = v],
    ['sl-brit', 'brightness', v => orbUniforms.uBrightness.value = v],
    ['sl-lerp', 'lerpSpeed',  v => LERP_SPEED     = v],
    ['sl-oroty', 'orbRotationDeg', v => orbRotationY = v * Math.PI / 180],
    ['sl-tkps', 'talkPulseSpd',  v => talkPulseSpd  = v],
    ['sl-tkpa', 'talkPulseAmt',  v => talkPulseAmt  = v],
    ['sl-thps', 'thinkPulseSpd', v => thinkPulseSpd = v],
    ['sl-thpa', 'thinkPulseAmt', v => thinkPulseAmt = v],
    ['sl-aspn', 'arcSpawnBase',  v => arcSpawnBase  = v],
    ['sl-adst', 'arcMaxDist',    v => arcMaxDist    = v],
    ['sl-alfe', 'arcLifeBase',   v => arcLifeBase   = v],
    ['sl-alfr', 'arcLifeRange',  v => arcLifeRange  = v],
    ['sl-ajit', 'arcJitter',     v => arcJitter     = v],
    ['sl-aflk', 'arcFlickerSpd', v => arcFlickerSpd = v],
    ['sl-aopc', 'arcOpacity',    v => arcOpacity    = v],
    ['sl-bobs', 'bobSize',       v => bobSize       = v],
  ];
  for (const [slId, key, fn] of nums) {
    if (cfg[key] != null) { syncSlider(slId, cfg[key]); fn(cfg[key]); }
  }
}

document.getElementById('btn-export').addEventListener('click', async () => {
  const cfg = getConfig();
  const src = await fetch(location.href).then(r => r.text());
  const tag = `<script>window.BOB_CONFIG=${JSON.stringify(cfg)};<\/script>`;
  const out = src.replace('</head>', tag + '\n</head>');
  const blob = new Blob([out], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bob-blob.html';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('file-import').click();
});

document.getElementById('file-import').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    let cfg = null;
    // JSON file: parse directly
    if (file.name.endsWith('.json')) {
      try { cfg = JSON.parse(text); } catch { alert('Invalid JSON file.'); return; }
    } else {
      // HTML export: extract window.BOB_CONFIG={...};
      const m = text.match(/window\.BOB_CONFIG\s*=\s*(\{[\s\S]*?\});/);
      if (m) { try { cfg = JSON.parse(m[1]); } catch { alert('Could not parse config in HTML file.'); return; } }
    }
    if (!cfg) { alert('No Bob config found in this file.'); return; }
    applyConfig(cfg);
  };
  reader.readAsText(file);
  // Reset so the same file can be re-imported if needed
  e.target.value = '';
});

// Load exported config if present (injected by export)
if (window.BOB_CONFIG) applyConfig(window.BOB_CONFIG);

</script>
